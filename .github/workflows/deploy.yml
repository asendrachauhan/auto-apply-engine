name: Deploy AutoApply AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - name: Audit backend dependencies
        run: cd backend && npm audit --audit-level=high
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with: { path: './', base: '${{ github.event.repository.default_branch }}', head: HEAD }

  # ── Backend lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - name: Validate env example
        run: cd backend && node -e "require('dotenv').config({path:'.env.example'}); console.log('✅ .env.example valid')"

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build -- --configuration production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: frontend/dist/, retention-days: 1 }

  # ── Deploy (only on main) ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: '${{ secrets.RAILWAY_TOKEN }}'
          service: 'autoapply-backend'
      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: '${{ secrets.VERCEL_TOKEN }}'
          vercel-org-id: '${{ secrets.VERCEL_ORG_ID }}'
          vercel-project-id: '${{ secrets.VERCEL_PROJECT_ID }}'
          working-directory: './frontend'
          vercel-args: '--prod'
